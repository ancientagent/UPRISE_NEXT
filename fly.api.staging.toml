app = "uprise-api-staging"
primary_region = "ord"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health/live"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    path = "/health/ready"
    timeout = "10s"
